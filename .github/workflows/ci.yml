name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    # A real Postgres for the adapter integration tests. The @universal-orm/rudder pg
    # suite runs only when RUDDER_PG_URL is set (it skips cleanly otherwise), so this
    # is what exercises the porsager `pg` driver path in CI — every other adapter test
    # runs on sqlite/pglite.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: vike_data_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      RUDDER_PG_URL: postgres://postgres:postgres@localhost:5432/vike_data_test

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Unit tests for every package that defines a `test` script
      # (universal-schema core, vike-auth, ...).
      - name: Unit tests
        run: pnpm -r test

      # Drift gate: committed artifacts must match what generation would emit,
      # for every target ORM.
      - name: Artifact drift gate
        working-directory: fixtures/codegen
        run: |
          VIKE_DATA_ORM=drizzle pnpm gen:check
          VIKE_DATA_ORM=prisma pnpm gen:check
          VIKE_DATA_ORM=rudder pnpm gen:check
