packages:
  - examples/*
  - fixtures/*
  - packages/*

# pnpm 11 requires build scripts to be explicitly approved via `allowBuilds`;
# `onlyBuiltDependencies` alone now fails a fresh/frozen install with
# ERR_PNPM_IGNORED_BUILDS (e.g. on a clean clone or in CI).
allowBuilds:
  esbuild: true
  better-sqlite3: true
  # Optional GemStack provider SDKs (gemini); @gemstack/ai-sdk lazy-loads them via
  # dynamic import inside provider methods, so their build scripts are not needed.
  '@google/genai': false
  protobufjs: false

onlyBuiltDependencies:
  - esbuild
  - better-sqlite3

verifyDepsBeforeRun: false

# Pin Vike to the commit build that contains config.pages (vike#3356, merged
# 2026-06-21; merge commit f6ecfb2), so extensions can define pages programmatically
# (vike-auth/react ships /login + /account). Drop back to a stable ^0.4 release once
# one publishes with #3356.
overrides:
  vike: 0.4.259-commit-f6ecfb2

minimumReleaseAgeExclude:
  - vike@0.4.259-commit-f6ecfb2
  # GemStack packages are first-party (we publish them); never hold their fresh
  # releases behind a release-age cooldown. Inert until one is configured.
  - '@gemstack/*'
